<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Silent Renew</title>
  </head>
  <body>
    <script>
      // oidc-client-ts irá processar o silent renew automaticamente
      window.addEventListener("load", function () {
        window.opener && window.opener.postMessage("oidc-silent-renew", window.location.origin);
      });
    </script>
  </body>
</html>
