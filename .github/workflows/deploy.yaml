name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: 24

jobs:
  set_environment:
    runs-on: ubuntu-latest
    outputs:
      mapped_environment: ${{ steps.branch_map.outputs.environment }}

    steps:
      - id: branch_map
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          ENVIRONMENT=""

          case "$BRANCH_NAME" in
            "develop")
              ENVIRONMENT="dev"
              ;;
            "release")
              ENVIRONMENT="hom"
              ;;
            "main")
              ENVIRONMENT="prod"
              ;;
            *)
              echo "Branch $BRANCH_NAME não mapeada para um ambiente de deploy. Abortando."
              exit 1
              ;;
          esac

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "Ambiente mapeado: $ENVIRONMENT"

  build:
    name: Build Nuxt
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ needs.set_environment.outputs.mapped_environment }}
      NUXT_COGNITO_CLIENT_ID: ${{ fromJSON('{"dev":"${{ secrets.NUXT_COGNITO_CLIENT_ID_DEV }}","hom":"${{ secrets.NUXT_COGNITO_CLIENT_ID_HOM }}","prod":"${{ secrets.NUXT_COGNITO_CLIENT_ID_PROD }}"}')[needs.set_environment.outputs.mapped_environment] }}
      NUXT_COGNITO_REGION: ${{ fromJSON('{"dev":"${{ secrets.NUXT_COGNITO_REGION_DEV }}","hom":"${{ secrets.NUXT_COGNITO_REGION_HOM }}","prod":"${{ secrets.NUXT_COGNITO_REGION_PROD }}"}')[needs.set_environment.outputs.mapped_environment] }}
      NUXT_COGNITO_AUTHORITY: ${{ fromJSON('{"dev":"${{ secrets.NUXT_COGNITO_AUTHORITY_DEV }}","hom":"${{ secrets.NUXT_COGNITO_AUTHORITY_HOM }}","prod":"${{ secrets.NUXT_COGNITO_AUTHORITY_PROD }}"}')[needs.set_environment.outputs.mapped_environment] }}
      NUXT_COGNITO_REDIRECT_URI: ${{ fromJSON('{"dev":"${{ secrets.NUXT_COGNITO_REDIRECT_URI_DEV }}","hom":"${{ secrets.NUXT_COGNITO_REDIRECT_URI_HOM }}","prod":"${{ secrets.NUXT_COGNITO_REDIRECT_URI_PROD }}"}')[needs.set_environment.outputs.mapped_environment] }}
      NUXT_AMBIENT: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Create .env file
        run: |
          echo "NUXT_COGNITO_CLIENT_ID=${{ env.NUXT_COGNITO_CLIENT_ID }}" > .env
          echo "NUXT_COGNITO_REGION=${{ env.NUXT_COGNITO_REGION }}" >> .env
          echo "NUXT_COGNITO_AUTHORITY=${{ env.NUXT_COGNITO_AUTHORITY }}" >> .env
          echo "NUXT_COGNITO_REDIRECT_URI=${{ env.NUXT_COGNITO_REDIRECT_URI }}" >> .env
          echo "NUXT_AMBIENT=${{ env.NUXT_AMBIENT }}" >> .env

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate static
        run: npm run generate

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-static
          path: .output/public
          retention-days: 1

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [build, set_environment]
    env:
      ENVIRONMENT: ${{ needs.set_environment.outputs.mapped_environment }}
      AWS_S3_BUCKET: soat-hackaton-soat-web-${{ needs.set_environment.outputs.mapped_environment }}
      AWS_CLOUDFRONT_DISTRIBUTION_ID: soat-hackaton-soat-web-oac-${{ needs.set_environment.outputs.mapped_environment }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nuxt-static
          path: dist

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload assets (long cache)
        run: |
          aws s3 sync dist s3://${{ env.AWS_S3_BUCKET }} \
            --exclude "*.html" \
            --cache-control "max-age=31536000,public"

      - name: Upload HTML (no cache)
        run: |
          aws s3 sync dist s3://${{ env.AWS_S3_BUCKET }} \
            --include "*.html" \
            --exclude "*" \
            --cache-control "max-age=0,no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
